<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>ASTREA™ Vitrina Express</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description"
        content="Vitrina digital para pequeños comercios. Comprá desde tu teléfono y enviá tu pedido por WhatsApp.">

    <meta name="theme-color" content="#22A745">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div id="app">

        <!-- ====================================================== -->
        <!-- STORE HEADER -->
        <!-- ====================================================== -->

        <header id="store-header"></header>

        <!-- ====================================================== -->
        <!-- MAIN -->
        <!-- ====================================================== -->

        <main id="main-content">

            <!-- Carrito -->
            <section id="cart-section"></section>

            <!-- Categorías -->
            <section id="category-section"></section>

            <!-- Productos -->
            <section id="product-grid"></section>

            <!-- Checkout -->
            <section id="checkout-section"></section>

        </main>

    </div>

    <!-- ====================================================== -->
    <!-- MODALS -->
    <!-- ====================================================== -->

    <div id="modal-root"></div>

    <!-- ====================================================== -->
    <!-- TOASTS -->
    <!-- ====================================================== -->

    <div id="toast-root"></div>

    <!-- ====================================================== -->
    <!-- LOADING -->
    <!-- ====================================================== -->

    <div id="loading-root"></div>

    <!-- ====================================================== -->
    <!-- SCRIPTS -->
    <!-- ====================================================== -->

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
